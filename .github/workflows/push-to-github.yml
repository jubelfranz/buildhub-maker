name: Push to GitHub (free branch)

on:
  repository_dispatch:
    types: [push_to_github]

jobs:
  push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout free branch
        uses: actions/checkout@v4
        with:
          ref: free
          fetch-depth: 1

      - name: Download FREE ZIP from BuildHub
        run: |
          echo "Downloading ${{ github.event.client_payload.zip_name }}..."
          curl -L -o free.zip "${{ github.event.client_payload.zip_url }}"
          echo "ZIP size: $(wc -c < free.zip) bytes"

      - name: Extract and push to free branch
        run: |
          git config user.email "buildhub@action.local"
          git config user.name "BuildHub Maker"
          unzip -o free.zip -d extracted/
          rsync -av --delete extracted/*/ . --exclude='.git' --exclude='extracted'
          rm -rf extracted free.zip
          git add -A
          git diff --staged --quiet || git commit -m "Update free v${{ github.event.client_payload.version }}"
          git push origin free

      - name: Send confirmation email
        if: success()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: host47.ssl-net.net
          server_port: 587
          secure: false
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: "✅ ${{ github.event.client_payload.zip_name }} v${{ github.event.client_payload.version }} pushed to GitHub"
          to: ${{ secrets.MAIL_USERNAME }}
          from: BuildHub Maker <${{ secrets.MAIL_USERNAME }}>
          body: |
            Push to GitHub successful!

            Plugin : ${{ github.event.client_payload.zip_name }}
            Version: ${{ github.event.client_payload.version }}
            Branch : free
            Time   : ${{ github.event.client_payload.triggered_at }}

            ---
            BuildHub Maker

      - name: Send failure email
        if: failure()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: host47.ssl-net.net
          server_port: 587
          secure: false
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: "FAILED - GitHub push: ${{ github.event.client_payload.zip_name }} v${{ github.event.client_payload.version }}"
          to: ${{ secrets.MAIL_USERNAME }}
          from: BuildHub Maker <${{ secrets.MAIL_USERNAME }}>
          body: |
            GitHub push FAILED!

            Plugin : ${{ github.event.client_payload.zip_name }}
            Version: ${{ github.event.client_payload.version }}
            Time   : ${{ github.event.client_payload.triggered_at }}

            Check log: https://github.com/${{ github.repository }}/actions

            ---
            BuildHub Maker
